version: '3.8'

services:
  # Agent service — receives messages from gateway, calls Claude
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABRICKS_HOST=${DATABRICKS_HOST}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN}
      - DATABRICKS_HTTP_PATH=${DATABRICKS_HTTP_PATH}
    volumes:
      - presence-data:/app/data
    restart: unless-stopped

  # Gateway — connects to Teams/Copilot (for local testing with ngrok)
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "3978:3978"
    environment:
      - BOT_APP_ID=${BOT_APP_ID}
      - BOT_APP_PASSWORD=${BOT_APP_PASSWORD}
      - AGENT_SERVICE_URL=http://agent:8000
    depends_on:
      - agent
    restart: unless-stopped

volumes:
  presence-data:
    # Shared volume for pipeline output → agent service
    # Pipeline job writes here, agent reads on startup
