name: Bootstrap Foundation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: bootstrap-foundation
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap Foundation Infrastructure
    runs-on: ubuntu-latest
    environment: bootstrap-foundation
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      ENV_SUFFIX: ${{ vars.ENV_SUFFIX }}
      AZURE_OPENAI_ACCOUNT_NAME: ${{ vars.AZURE_OPENAI_ACCOUNT_NAME }}
    steps:
      - uses: actions/checkout@v5
      - uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Run foundation bootstrap
        run: bash infra/scripts/deploy-foundation.sh
